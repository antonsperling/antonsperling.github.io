- name: "the captain"
  role: "russian diesel train"
  bio: "fahren gelernt auf einer 26 Jahre alten 600er Hornet, mit der Bremsen zum Glücksspiel wird und Beschleunigung schlicht nicht vorhanden ist. Andere verlassen sich auf die Traktionskontrolle, er auf seine neun Leben. Pin im Kopp!"
  photo: "/assets/images/the-captain.png"
- name: "the flying dutchman"
  role: "sensei miagi"
  bio: "wenn der alte Mann mal von unserer Pace gelangweilt ist, und den Hammer fallen lässt, treibt es den anderen regelmäßig Tränen in die Augen. Verhöhnt alle dadurch, dass er immer nur 0,5 sec schneller fährt als der Rest. Pin im Kopp!"
  photo: "/assets/images/flying-dutchman.png"
- name: "big bad punisher"
  role: "the turkish crash kid"
  bio: "wechselt Motorräder häufiger als ich meine Socken. Immer auf der Suche nach Verbesserung. Bei sich und beim Bike. Most crashed throughout the years. Pin im Kopp!"
  photo: "/assets/images/big-bad-punisher.png"
- name: "african road rage"
  role: "suspension whisperer"
  bio: "sein Bike hat keinen cm² ohne Kratzer, Dellen oder Beschädigungen. Dafür aber schon den fünften Satz Fahrwerkskomponenten. Fühlt jeden Klick. Pin im Kopp!"
  photo: "/assets/images/african-road-rage.png"
- name: "italian stallion"
  role: "you only live once"
  bio: "erste Rennsteckenerfahrungen auf der 600er Gixxe ohne vorher einen Führerschein gemacht zu haben, geschweige denn einen Kilometer auf der Straße gefahren zu sein. Ssssaufen ist wichtiger als Rundenzeiten. Pin im Kopp!"
  photo: "/assets/images/italian-stallion.png"
