- name:
    en: "the captain"
    de: "the captain"
    it: "il capitano"
    nl: "de kapitein"
    fr: "le capitaine"
    tr: "kaptan"
    ru: "капитан"
    uk: "капітан"
  role:
    en: "russian diesel train"
    de: "russian diesel train"
    it: "treno diesel russo"
    nl: "russische diesel trein"
    fr: "train diesel russe"
    tr: "rus dizel treni"
    ru: "русский дизельный поезд"
    uk: "російський дизельний поїзд"
  bio:
    en: "learned to ride on a 26-year-old 600cc Hornet where brakes are a gamble and acceleration is simply non-existent. Others rely on traction control, he relies on his nine lives."
    de: "fahren gelernt auf einer 26 Jahre alten 600er Hornet, mit der Bremsen zum Glücksspiel wird und Beschleunigung schlicht nicht vorhanden ist. Andere verlassen sich auf die Traktionskontrolle, er auf seine neun Leben."
    it: "ha imparato a guidare su una Hornet 600cc di 26 anni dove i freni sono un azzardo e l'accelerazione è semplicemente assente. Altri si affidano al controllo della trazione, lui si affida alle sue nove vite."
    nl: "leerde rijden op een 26-jarige 600cc Hornet waarbij remmen een gok zijn en acceleratie eenvoudig afwezig is. Anderen vertrouwen op tractiecontrole, hij vertrouwt op zijn negen levens."
    fr: "a appris à conduire sur une Hornet 600cc de 26 ans où les freins sont un pari et l'accélération est simplement inexistante. Les autres comptent sur le contrôle de la traction, lui compte sur ses neuf vies."
    tr: "26 yaşında bir 600cc Hornet'te sürüş öğrendi, burada frenler bir kumar ve ivmelenme basitçe mevcut değildir. Diğerleri çekişme kontrolüne güvenirken, o dokuz hayatına güvenir."
    ru: "научился ездить на 26-летнем 600-кубовом Hornet, где тормоза - это азартная игра, а ускорение просто отсутствует. Другие полагаются на контроль тяги, он полагается на свои девять жизней."
    uk: "навчився їздити на 26-річному 600-кубовому Hornet, де гальма - це азартна гра, а прискорення просто відсутнє. Інші покладаються на контроль тяги, він покладається на свої дев'ять життів."
  photo: "/assets/images/the-captain.png"
- name:
    en: "the flying dutchman"
    de: "the flying dutchman"
    it: "l'olandese volante"
    nl: "de vliegende hollander"
    fr: "le hollandais volant"
    tr: "uçan hollandalı"
    ru: "летучий голландец"
    uk: "літаючий голландець"
  role:
    en: "sensei miagi"
    de: "sensei miagi"
    it: "signor miyagi"
    nl: "meester miyagi"
    fr: "monsieur miyagi"
    tr: "sensei miagi"
    ru: "сенсей миаги"
    uk: "сенсей міягі"
  bio:
    en: "when the old man gets bored with our pace and drops the hammer, it regularly brings tears to the others' eyes. Makes fun of everyone by only going 0.5 sec faster than the rest."
    de: "wenn der alte Mann mal von unserer Pace gelangweilt ist, und den Hammer fallen lässt, treibt es den anderen regelmäßig Tränen in die Augen. Verhöhnt alle dadurch, dass er immer nur 0,5 sec schneller fährt als der Rest."
    it: "quando il vecchio si annoia del nostro ritmo e lascia cadere il martello, regolarmente porta alle lacrime gli altri. Prende in giro tutti andando solo 0,5 secondi più veloce del resto."
    nl: "wanneer de oude man zich verveelt met ons tempo en de hamer loslaat, brengt het regelmatig tranen in de ogen van de anderen. Plaagt iedereen door slechts 0,5 sec sneller te gaan dan de rest."
    fr: "quand le vieil homme s'ennuie de notre rythme et lâche le marteau, cela apporte régulièrement des larmes aux yeux des autres. Se moque de tout le monde en allant seulement 0,5 sec plus vite que le reste."
    tr: "yaşlı adam bizim tempodan sıkılıp çekici indirdiğinde, diğerlerinin gözlerine düzenli olarak gözyaşı getiriyor. Herkesi sadece gerisinden 0,5 saniye daha hızlı giderek alay ediyor."
    ru: "когда старик скучает по нашему темпу и роняет молоток, это регулярно вызывает слезы у других. Насмехается над всеми, едя только на 0,5 секунды быстрее остальных."
    uk: "коли старий чоловік скучає за нашим темпом і випускає молот, це регулярно вносить сльози в очі інших. Глузує з усіх, їдячи лише на 0,5 секунди швидше за решту."
  photo: "/assets/images/flying-dutchman.png"
- name:
    en: "big bad punisher"
    de: "big bad punisher"
    it: "grande cattivo punisher"
    nl: "grote slechte punisher"
    fr: "grand mauvais punisher"
    tr: "büyük kötü cezalandırıcı"
    ru: "большой плохой каратель"
    uk: "великий поганий каратель"
  role:
    en: "the turkish crash kid"
    de: "the turkish crash kid"
    it: "il ragazzo turco degli incidenti"
    nl: "het turkse crash kind"
    fr: "le enfant turc de la panne"
    tr: "türk çarpışma çocuğu"
    ru: "турецкий мальчик крушения"
    uk: "турецька дитина крушення"
  bio:
    en: "changes motorcycles more often than socks. Always looking for improvement - both in himself and the bike. Most crashed throughout the years."
    de: "wechselt Motorräder häufiger als ich meine Socken. Immer auf der Suche nach Verbesserung. Bei sich und beim Bike. Most crashed throughout the years."
    it: "cambia motociclette più spesso che calzini. Sempre alla ricerca di miglioramenti - sia in se stesso che nella moto. La maggior parte degli incidenti nel corso degli anni."
    nl: "wisselt motorfietsen vaker dan sokken. Altijd op zoek naar verbetering - zowel in zichzelf als in de motor. Meeste crashes door de jaren heen."
    fr: "change les motos plus souvent que les chaussettes. Toujours à la recherche d'améliorations - en lui-même et la moto. La plupart des accidents au fil des ans."
    tr: "çoraplardan daha sık motosiklet değiştirir. Daima kendinde ve motorda gelişim arıyor. Yıllar içinde en çok kaza."
    ru: "меняет мотоциклы чаще, чем носки. Всегда ищет улучшения - как в себе, так и в мотоцикле. Больше всего аварий на протяжении многих лет."
    uk: "змінює мотоцикли частіше, ніж шкарпетки. Завжди шукає вдосконалення - як у собі, так і в мотоциклі. Найбільше збитків протягом років."
  photo: "/assets/images/big-bad-punisher.png"
- name:
    en: "african road rage"
    de: "african road rage"
    it: "collera stradale africana"
    nl: "afrikaanse wegwoede"
    fr: "rage routière africaine"
    tr: "afrikalı yol öfkesi"
    ru: "африканская ярость на дороге"
    uk: "африканська лють на дорозі"
  role:
    en: "suspension whisperer"
    de: "suspension whisperer"
    it: "sussurratore di sospensioni"
    nl: "demper fluisteraar"
    fr: "chuchoteur de suspension"
    tr: "süspansiyon fısıltı"
    ru: "шепот подвески"
    uk: "шепіт підвіски"
  bio:
    en: "his bike doesn't have a square cm without scratches, dents or damage. But already on the fifth set of chassis components. Feels every click."
    de: "sein Bike hat keinen cm² ohne Kratzer, Dellen oder Beschädigungen. Dafür aber schon den fünften Satz Fahrwerkskomponenten. Fühlt jeden Klick."
    it: "la sua moto non ha un cm quadrato senza graffi, ammaccature o danni. Ma già sul quinto set di componenti dello chassis. Sente ogni clic."
    nl: "zijn motor heeft niet een vierkante cm zonder krassen, deuken of schade. Maar al op de vijfde set chassiscomponenten. Voelt elke klik."
    fr: "sa moto n'a pas un cm carré sans rayures, bosses ou dommages. Mais déjà sur le cinquième ensemble de composants de châssis. Sent chaque clic."
    tr: "motosikleti çizik, göçük veya hasar olmaksızın bir cm kareye sahip değildir. Ama zaten beşinci şasi bileşenleri seti üzerinde. Her tıklama hissediyor."
    ru: "его мотоцикл не имеет ни одного см² без царапин, вмятин или повреждений. Но уже на пятом наборе компонентов шасси. Чувствует каждый щелчок."
    uk: "його мотоцикл не має жодного см² без подряпин, вм'ятин або пошкоджень. Але вже на п'ятому наборі компонентів шасі. Відчуває кожен клік."
  photo: "/assets/images/african-road-rage.png"
- name:
    en: "italian stallion"
    de: "italian stallion"
    it: "stallone italiano"
    nl: "italiaanse hengst"
    fr: "étalon italien"
    tr: "italyan aygırı"
    ru: "итальянский жеребец"
    uk: "італійський жеребець"
  role:
    en: "you only live once"
    de: "you only live once"
    it: "si vive una sola volta"
    nl: "je leeft maar een keer"
    fr: "on ne vit qu'une fois"
    tr: "sadece bir kez yaşarsın"
    ru: "живешь только один раз"
    uk: "живеш тільки один раз"
  bio:
    en: "first race track experience on a 600cc Gixxer without ever having gotten a license or ridden a mile on the street. Drinking is more important than lap times."
    de: "erste Rennsteckenerfahrungen auf der 600er Gixxe ohne vorher einen Führerschein gemacht zu haben, geschweige denn einen Kilometer auf der Straße gefahren zu sein. Ssssaufen ist wichtiger als Rundenzeiten."
    it: "prima esperienza di pista su una Gixxer 600cc senza mai aver preso una patente o guidato un miglio sulla strada. Bere è più importante dei tempi in giro."
    nl: "eerste racebaanervaaring op een 600cc Gixxer zonder ooit een rijbewijs te hebben behaald of een kilometer op straat te hebben gereden. Drinken is belangrijker dan rondetijden."
    fr: "première expérience de circuit sur une Gixxer 600cc sans jamais avoir obtenu de permis ni roulé un kilomètre sur la route. Boire est plus important que les temps au tour."
    tr: "hiç bir lisans almaksızın veya yolda bir kilometre git olmaksızın 600cc Gixxer üzerinde ilk yarış pisti deneyimi. İçmek tur zamanlarından daha önemli."
    ru: "первый опыт на гоночной трассе на 600-кубовом Gixxer без получения лицензии или проезда мили по дороге. Питье важнее, чем времена кругов."
    uk: "перший досвід на гоночній трасі на 600-кубовому Gixxer без отримання ліцензії чи їзди на милю по дороге. Пиття важливіше, ніж часи кола."
  photo: "/assets/images/italian-stallion.png"
